<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escríbeme por WhatsApp</title>
<style>
  :root {
    --bg: #0e0f0f;
    --card: #161817;
    --wa-green: #25D366;
    --wa-green-dim: #1aa651;
    --text-main: #f2f2f0;
    --text-sub: #8a8d8a;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  .wa-card {
    background: var(--card);
    border: 1px solid #232524;
    border-radius: 18px;
    padding: 22px 26px;
    display: flex;
    align-items: center;
    gap: 16px;
    max-width: 360px;
    width: 100%;
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
  }

  .wa-avatar {
    position: relative;
    flex-shrink: 0;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: #1f2120;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .wa-avatar svg {
    width: 26px;
    height: 26px;
    fill: var(--wa-green);
  }

  .wa-dot {
    position: absolute;
    bottom: -2px;
    right: -2px;
    width: 14px;
    height: 14px;
    background: var(--wa-green);
    border: 2px solid var(--card);
    border-radius: 50%;
  }

  .wa-dot::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: var(--wa-green);
    animation: pulse 2s ease-out infinite;
  }

  @keyframes pulse {
    0%   { transform: scale(1);   opacity: 0.6; }
    70%  { transform: scale(2.4); opacity: 0; }
    100% { transform: scale(2.4); opacity: 0; }
  }

  .wa-text {
    flex: 1;
    min-width: 0;
  }

  .wa-title {
    color: var(--text-main);
    font-size: 15px;
    font-weight: 600;
    margin: 0 0 2px 0;
    white-space: nowrap;
  }

  .wa-sub {
    color: var(--text-sub);
    font-size: 12.5px;
    margin: 0 0 10px 0;
  }

  .wa-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--wa-green);
    color: #06210f;
    text-decoration: none;
    font-size: 13.5px;
    font-weight: 700;
    padding: 9px 14px;
    border-radius: 10px;
    transition: background 0.15s ease, transform 0.1s ease;
  }

  .wa-btn:hover {
    background: var(--wa-green-dim);
  }

  .wa-btn:active {
    transform: scale(0.97);
  }

  .wa-btn svg {
    width: 15px;
    height: 15px;
    fill: #06210f;
  }

  @media (prefers-reduced-motion: reduce) {
    .wa-dot::after { animation: none; }
  }
</style>
</head>
<body>

  <div class="wa-card">
    <div class="wa-avatar">
      <svg viewBox="0 0 32 32" aria-hidden="true">
        <path d="M16.001 3C9.373 3 4 8.373 4 15.001c0 2.39.7 4.617 1.91 6.49L4 29l7.74-1.86A11.93 11.93 0 0 0 16 27c6.628 0 12-5.373 12-12.001C28 8.373 22.628 3 16.001 3zm6.93 16.93c-.29.82-1.46 1.6-2.36 1.78-.6.12-1.39.22-4.04-.87-3.39-1.4-5.58-4.84-5.75-5.07-.17-.23-1.38-1.84-1.38-3.51 0-1.67.87-2.48 1.18-2.82.31-.34.68-.42.9-.42.23 0 .45.002.65.012.21.01.49-.08.77.59.29.7.97 2.42 1.06 2.6.09.18.15.39.03.62-.12.23-.18.37-.36.57-.18.2-.38.45-.54.6-.18.18-.37.37-.16.74.21.37.95 1.57 2.04 2.55 1.41 1.26 2.6 1.65 3 1.84.4.19.63.16.86-.09.23-.25.99-1.15 1.25-1.55.26-.4.52-.33.87-.2.35.13 2.22 1.05 2.6 1.24.38.19.63.28.72.44.09.16.09.91-.2 1.73z"/>
      </svg>
      <span class="wa-dot"></span>
    </div>

    <div class="wa-text">
      <p class="wa-title">Victor Azcona</p>
      <p class="wa-sub">Respondo por WhatsApp</p>
      <a class="wa-btn" id="wa-link" href="#" target="_blank" rel="noopener">
        <svg viewBox="0 0 32 32" aria-hidden="true">
          <path d="M16.001 3C9.373 3 4 8.373 4 15.001c0 2.39.7 4.617 1.91 6.49L4 29l7.74-1.86A11.93 11.93 0 0 0 16 27c6.628 0 12-5.373 12-12.001C28 8.373 22.628 3 16.001 3z"/>
        </svg>
        Escríbeme
      </a>
    </div>
  </div>

<script>
  // ---- Personaliza aquí ----
  const numero = "18493623254"; // tu número con código de país, sin + ni espacios
  const mensaje = ""; // déjalo vacío para no enviar texto predeterminado
  // ---------------------------

  document.getElementById("wa-link").href = mensaje
    ? "https://wa.me/" + numero + "?text=" + encodeURIComponent(mensaje)
    : "https://wa.me/" + numero;
</script>

</body>
</html>
